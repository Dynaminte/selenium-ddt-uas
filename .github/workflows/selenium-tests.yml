name: Selenium DDT Tests — UAS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Diperbarui ke v7 (Node 24 Native & Safer PR defaults)
      - uses: actions/checkout@v7

      # Diperbarui ke v6 (Node 24 Native)
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DDT Tests (Headless)
        run: |
          pytest tests/ --alluredir=reports/allure-results -v --tb=short
        continue-on-error: true

      # Diperbarui ke v7 (Node 24 Native & Unzipped direct capability)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: reports/allure-results

      # Diperbarui ke v7 (Node 24 Native)
      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-on-failure
          path: reports/screenshots/
